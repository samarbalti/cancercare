<div class="register-container">
  <nav class="auth-nav">
    <a routerLink="/" class="nav-logo">🏥 CancerCare</a>
    <div class="nav-actions">
      <a routerLink="/login">Connexion</a>
    </div>
  </nav>
  <div class="register-box">
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <h1>CancerCare</h1>
      <p>Inscription Patient</p>
    </div>
    <form (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" [(ngModel)]="user.firstName" name="firstName" required>
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" [(ngModel)]="user.lastName" name="lastName" required>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="user.email" name="email" required>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="user.password" name="password" required minlength="6">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" [(ngModel)]="user.phone" name="phone">
        </div>
        <div class="form-group">
          <label>Date de naissance</label>
          <input type="date" [(ngModel)]="user.dateOfBirth" name="dateOfBirth">
        </div>
      </div>

      <div class="form-group">
        <label>Genre</label>
        <select [(ngModel)]="user.gender" name="gender">
          <option value="">Sélectionner</option>
          <option value="male">Homme</option>
          <option value="female">Femme</option>
          <option value="other">Autre</option>
        </select>
      </div>

      <h3>Contact d'urgence</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Nom</label>
          <input type="text" [(ngModel)]="user.emergencyContact.name" name="ecName">
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" [(ngModel)]="user.emergencyContact.phone" name="ecPhone">
        </div>
      </div>

      <div class="error" *ngIf="error">{{ error }}</div>
      <div class="success" *ngIf="success">{{ success }}</div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Inscription...' : 'S\'inscrire' }}
      </button>
    </form>

    <p class="login-link">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
